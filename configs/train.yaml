# @package _global_

defaults:
  - _self_
  - data: null
  - model: null
  - task: null


output_dir: ./runs/train/${now:%Y-%m-%d}_${now:%H-%M-%S}

# dataloading
batch_size: 2
num_workers: 4
prefetch_factor: null      # null -> PyTorch default (2). Lower (e.g. 1) reduces worker queue memory.
persistent_workers: false  # true keeps workers alive across epochs (skips re-fork)

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1.0e-4
warmup_steps: null          # null keeps legacy 5% warmup; set 0 for no warmup.
num_epochs: 1
max_steps: null
log_every: 10
save_every: 100
keep_latest_state_only: false  # true keeps all weight checkpoints but only the latest resumable training state.
eval_every: 50
eval_num_inference_steps: 10
eval_num_samples: 1
rank_timer_every: 10
rank_timer_sync_cuda: true

# qwen text embedding pre-cache
qwen_cache_batch_size: 32
qwen_cache_overwrite: false
qwen_cache_save_workers: 8
flux2_qwen3_model_spec: null

# InternData-A1 preprocessing/cache controls
precache_arrow: true
precache_num_workers: 4
build_lerobot_meta_cache: true
build_norm_stats: true
precache_fuse_norm_stats: true
force_rebuild_norm_stats: false
norm_stats_use_arrow_cache: true
norm_stats_bulk_read_arrow: true
norm_stats_cache_enabled: true
norm_stats_cache_dir: null
precache_profile: false
precache_profile_min_sec: 0.0

# training
gradient_accumulation_steps: 1
mixed_precision: "bf16" # one of: [no, fp16, bf16]
seed: 42
max_grad_norm: 1.0
weight_decay: 0.0
resume: null

# tensorboard
tensorboard:
  enabled: true
  log_dir: null

# wandb
wandb:
  enabled: false
  workspace: arisilin
  project: imagewam
  name: train
  group: null
  mode: online

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
