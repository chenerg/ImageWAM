# @package _global_

defaults:
  - override /data: libero_omnigen2_pair
  - override /model: imagewam_flux2_klein_9b_base
  - _self_

data:
  train:
    require_text_cache: false
    qwen_text_cache_dir: ${data.data_root}/flux2_qwen3_cache_9b
    qwen_context_len: 128
    qwen_text_cache_format: qwen3_flux2

batch_size: 4
num_workers: 24
prefetch_factor: 2
persistent_workers: true

learning_rate: 1e-4
num_epochs: 10
max_steps: null
log_every: 10
save_every: 1000
eval_every: 100
eval_num_samples: 8
keep_latest_state_only: true

gradient_accumulation_steps: 3
weight_decay: 1.0e-2
mixed_precision: "bf16"
resume: null

model:
  proprio_dim: ${data.train.processor.proprio_output_dim}

wandb:
  enabled: true
  project: imagewam
  name: libero_flux2_klein_9b_base_imagewam
