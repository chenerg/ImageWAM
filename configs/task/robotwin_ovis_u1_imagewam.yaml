# @package _global_

defaults:
  - override /data: robotwin_omnigen2
  - override /model: imagewam_ovis_u1
  - _self_

data:
  train:
    qwen_text_cache_dir: null
    require_text_cache: false
  val:
    nonidle_filter_path: null
    qwen_text_cache_dir: null
    require_text_cache: false

batch_size: 4
num_workers: 8
prefetch_factor: 2
persistent_workers: true

lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: null
log_every: 10
save_every: 2500
eval_every: 500

gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null

model:
  proprio_dim: ${data.train.processor.proprio_output_dim}

wandb:
  enabled: true
  project: imagewam
  name: robotwin_ovis_u1_imagewam
