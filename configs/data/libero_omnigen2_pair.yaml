data_root: ./data/libero_mujoco3.3.2

train:
  _target_: imagewam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - ${data.data_root}/libero_spatial_no_noops_lerobot
    - ${data.data_root}/libero_object_no_noops_lerobot
    - ${data.data_root}/libero_goal_no_noops_lerobot
    - ${data.data_root}/libero_10_no_noops_lerobot
  shape_meta:
    images:
      - key: image
        raw_shape: [3, 512, 512]
        shape: [3, 224, 224]
      - key: wrist_image
        raw_shape: [3, 512, 512]
        shape: [3, 224, 224]
    action:
      - key: default
        raw_shape: 7
        shape: 7
    state:
      - key: default
        raw_shape: 8
        shape: 8
  num_frames: 17
  global_sample_stride: 1
  action_video_freq_ratio: 1
  video_size: [224, 448]
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: true
  skip_padding_as_possible: false
  concat_multi_camera: "horizontal"
  video_augmentation:
    _target_: imagewam.datasets.lerobot.transforms.image.VideoAugmentation
    p: 0.65
    augment_types: [corrupt_only, color_only, both, both]
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.25
      hue: 0.04
    gamma:
      range: [0.8, 1.25]
    gaussian_noise:
      std: 0.015
    random_resized_crop:
      scale: [0.92, 1.0]
      ratio: preserve
    rotate:
      degrees: 8.0
      fill: mean
    exposure:
      ev_range: [-0.25, 0.25]
  require_text_cache: false
  endpoint_frames_only: true
  qwen_text_cache_dir: ${data.data_root}/text_embeds_cache
  qwen_context_len: 128
  pretrained_norm_stats: null
  processor:
    _target_: imagewam.datasets.lerobot.processors.imagewam_processor.ImageWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    image_obs_steps: 2
    num_output_cameras: 2
    action_output_dim: 7
    proprio_output_dim: 8
    delta_action_dim_mask:
      default: [true, true, true, true, true, true, false]
    action_state_transforms: null
    use_stepwise_action_norm: false
    norm_default_mode: min/max
    norm_exception_mode: null
    action_state_merger:
      _target_: imagewam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: imagewam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
    val_transforms:
      - _target_: imagewam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
  text_embedding_cache_dir: null
  context_len: 128
