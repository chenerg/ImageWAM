data_root: ./data/robotwin2.0
robotwin_root: ${data.data_root}/robotwin2.0
qwen_cache_dir: ${data.robotwin_root}/qwen_cache
nonidle_filter_path: ${data.robotwin_root}/nonidle_ranges.json

train:
  _target_: imagewam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - ${data.robotwin_root}
  shape_meta:
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14 # before transform
        shape: 14 # after transform
    state:
      - key: default
        raw_shape: 14 # before transform
        shape: 14 # after transform
  num_frames: 17
  global_sample_stride: 1
  action_video_freq_ratio: 1 # 16 action, 16 video frames
  video_size: [288, 256] # final resize video
  camera_key: null
  val_set_proportion: 0.01
  is_training_set: true
  pretrained_norm_stats: ${data.data_root}/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  robotwin_camera_layout: "compact_288x256"
  video_augmentation:
    _target_: imagewam.datasets.lerobot.transforms.image.VideoAugmentation
    p: 0.5
    augment_types: [corrupt_only, color_only, both]
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.03
    gamma:
      range: [0.9, 1.1]
    gaussian_noise:
      std: 0.01
    random_resized_crop:
      scale: [0.95, 1.0]
      ratio: preserve
    rotate:
      degrees: 5.0
      fill: mean
  require_text_cache: false
  endpoint_frames_only: true
  nonidle_filter_path: ${data.nonidle_filter_path}
  qwen_text_cache_dir: ${data.qwen_cache_dir}
  qwen_context_len: 128
  processor:
    _target_: imagewam.datasets.lerobot.processors.imagewam_processor.ImageWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    image_obs_steps: 2
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14

    # action & state normalization
    action_state_transforms: null
    # action_state_transforms:
    #   - _target_: imagewam.datasets.lerobot.transforms.libero.LiberoTransform
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null

    action_state_merger:
      _target_: imagewam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign

    train_transforms:
      - _target_: imagewam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: imagewam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: null
  context_len: 128

