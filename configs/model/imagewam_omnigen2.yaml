_target_: imagewam.runtime.create_imagewam_omnigen2

omnigen2_model_path: ???
omnigen2_vae_path: ???
# WARNING/TODO:
# OmniGen2 official training config uses the upstream Qwen/Qwen2.5-VL-3B-Instruct
# as `pretrained_text_encoder_model_name_or_path`. We follow that here for now.
# It is still unclear whether the official inference pipeline's `mllm/` subfolder
# is a separately tuned/correct text path for this use case. The `mllm/` weights
# appear to be loaded by OmniGen2Pipeline as Qwen2_5_VLForConditionalGeneration,
# while training uses Qwen2_5_VLModel from the public Qwen checkpoint. Reconfirm
# with upstream before treating this as final.
qwen_path: ???
transformer_subfolder: transformer
vae_subfolder: vae
load_text_encoder: false
proprio_dim: null  # set to ${data.train.processor.proprio_output_dim} to enable robot state token conditioning
mot_checkpoint_mixed_attn: true
mot_gqa_implementation: repeat   # repeat | sdpa
mot_force_flash_attention: false # set true with mot_gqa_implementation=sdpa to force FLASH_ATTENTION backend
omnigen2_online_text_cache_compatible: false
qwen_context_len: 128
# Default off for old checkpoint compatibility. Set true for new runs that need
# the OmniGen2 text-padding/proprio packing fix.
pack_proprio_after_text: false
action_dit_pretrained_path: null

action_dit_config:
  action_dim: ${data.train.processor.action_output_dim}
  residual_dim: 1024
  # NOTE:
  # The following MoT-compatibility shape fields are placeholders and will be
  # overridden at runtime/preprocess time from the loaded OmniGen2 transformer
  # config (`num_layers`, `num_attention_heads`, `num_kv_heads`,
  # `hidden_size // num_attention_heads`). The values below came from an older
  # source-code default (26 layers, hidden=2304, heads=24, kv_heads=8,
  # head_dim=96). The released BAAI/OmniGen2 checkpoint uses 32 layers,
  # hidden=2520, heads=21, kv_heads=7, head_dim=120.
  num_heads: 24
  num_kv_heads: 8
  attn_head_dim: 96
  num_layers: 26
  multiple_of: 256
  ffn_dim_multiplier: null
  norm_eps: 1.0e-5
  frequency_embedding_size: 256
  timestep_scale: 1.0
  max_action_horizon: 64
  rope_theta: 10000.0
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}

video_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

action_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

loss:
  lambda_video: 0.5
  lambda_action: 1.0
